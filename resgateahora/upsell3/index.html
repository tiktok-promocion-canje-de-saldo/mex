<script>
(function () {
  const SUPABASE_URL = 'https://gzsxyczfckipomlkdivr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6c3h5Y3pmY2tpcG9tbGtkaXZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjQxNzMsImV4cCI6MjA5MTcwMDE3M30.L-jZ8EfTz-XdYf7nb6nKwpd6Y4JOejBMrIEDIe1Q6iY'; // Settings → API → anon public

  // ─────────────────────────────────────────
  // 1. Gera ou recupera o session_id único
  // ─────────────────────────────────────────
  let sessionId = localStorage.getItem('_sid');
  if (!sessionId) {
    sessionId = 'sid_' + Math.random().toString(36).substr(2, 16) + '_' + Date.now();
    localStorage.setItem('_sid', sessionId);
  }

  // ─────────────────────────────────────────
  // 2. Captura UTMs da URL atual
  // ─────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const utmKeys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
  let hasUtm = false;

  utmKeys.forEach(function (key) {
    if (params.get(key)) {
      localStorage.setItem(key, params.get(key));
      hasUtm = true;
    }
  });

  // ─────────────────────────────────────────
  // 3. Salva no Supabase se vier com UTM
  // ─────────────────────────────────────────
  if (hasUtm) {
    var payload = {
      session_id: sessionId,
      utm_source:   localStorage.getItem('utm_source'),
      utm_medium:   localStorage.getItem('utm_medium'),
      utm_campaign: localStorage.getItem('utm_campaign'),
      utm_content:  localStorage.getItem('utm_content'),
      utm_term:     localStorage.getItem('utm_term'),
      page_url:     window.location.href
    };

    fetch(SUPABASE_URL + '/rest/v1/visitors', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify(payload)
    }).then(function (res) {
      if (res.ok) console.log('[Tracker] Visitante salvo ✅');
      else console.warn('[Tracker] Erro ao salvar visitante');
    }).catch(function (err) {
      console.error('[Tracker] Erro:', err);
    });
  }

  // ─────────────────────────────────────────
  // 4. Expõe o sessionId globalmente
  //    Use window._sid nos botões de compra
  // ─────────────────────────────────────────
  window._sid = sessionId;

})();
</script>

<script>
function irParaCheckout() {
  var sid = window._sid || '';

  // ⚠️ Substitua pela URL real do seu produto na IronPay
  var checkoutUrl = 'https://checkout.ironpay.com.br/SEU_PRODUTO?sid=' + sid;

  // Também adiciona os UTMs na URL caso a IronPay leia direto
  var utmSource   = localStorage.getItem('utm_source')   || '';
  var utmMedium   = localStorage.getItem('utm_medium')   || '';
  var utmCampaign = localStorage.getItem('utm_campaign') || '';
  var utmContent  = localStorage.getItem('utm_content')  || '';
  var utmTerm     = localStorage.getItem('utm_term')     || '';

  if (utmSource)   checkoutUrl += '&utm_source='   + encodeURIComponent(utmSource);
  if (utmMedium)   checkoutUrl += '&utm_medium='   + encodeURIComponent(utmMedium);
  if (utmCampaign) checkoutUrl += '&utm_campaign=' + encodeURIComponent(utmCampaign);
  if (utmContent)  checkoutUrl += '&utm_content='  + encodeURIComponent(utmContent);
  if (utmTerm)     checkoutUrl += '&utm_term='     + encodeURIComponent(utmTerm);

  window.location.href = checkoutUrl;
}
</script>
